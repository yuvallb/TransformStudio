name: Bug Report
description: Report something broken in RefineIt
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. RefineIt runs entirely in the browser — please include steps to reproduce and your browser/OS if you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: After loading the Sales demo and running the pipeline, the Filter node shows an error…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Open RefineIt
        2. Load the Sales demo
        3. Click Run
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: Chrome 136 on macOS 15
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error message or console output
      description: Paste any visible error text or relevant console output.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
