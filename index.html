<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/RefineIt/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Keep in sync with src/lib/site-config.ts -->
    <meta
      name="description"
      content="RefineIt is a visual workspace for reusable data workflows. Users build transformations as interactive flow diagrams, execute them locally in the browser using Python and Pandas, and share or export them as reproducible assets without managing infrastructure."
    />
    <meta property="og:title" content="RefineIt" />
    <meta
      property="og:description"
      content="RefineIt is a visual workspace for reusable data workflows. Users build transformations as interactive flow diagrams, execute them locally in the browser using Python and Pandas, and share or export them as reproducible assets without managing infrastructure."
    />
    <meta property="og:url" content="https://yuvallb.github.io/RefineIt/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://yuvallb.github.io/RefineIt/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>RefineIt</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA route restoration (see public/404.html) -->
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          var decoded = location.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            location.pathname.slice(0, -1) + decoded + location.hash,
          );
        }
      })(window.location);
    </script>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
